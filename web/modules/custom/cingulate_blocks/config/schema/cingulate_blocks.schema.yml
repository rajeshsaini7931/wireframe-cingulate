cingulate_blocks.register_modal.settings:
  type: config_object
  label: "Register Modal settings"
  mapping:
    modal_title:
      type: string
      label: "Modal title"
    modal_description:
      type: mapping
      label: "Modal description"
      mapping:
        value:
          type: text
          label: "Description text"
        format:
          type: string
          label: "Text format"
    cta_text:
      type: string
      label: "CTA button text"
    cta_url:
      type: string
      label: "CTA button URL"
    cookie_duration:
      type: integer
      label: "Cookie duration in seconds"
